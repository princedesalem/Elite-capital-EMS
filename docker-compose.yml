version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: extranet
      MYSQL_DATABASE: EMS_DB
      MYSQL_USER: extranet
      MYSQL_PASSWORD: extranet
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - '3307:3306'  # host port changed to avoid conflict with existing MySQL
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://extranet:extranet@db:3306/EMS_DB
      SECRET_KEY: replace-with-secure-secret-key-12345
      ACCESS_TOKEN_EXPIRE_MINUTES: '60'
      APP_URL: http://localhost:5173
      INIT_ADMIN_PW: ChangeMe123!@#
    ports:
      - '8000:8000'
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - '5173:5173'
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host"]

volumes:
  db_data:
