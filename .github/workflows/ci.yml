name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend pytest (SQLite in-memory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: 'sqlite://'
          SECRET_KEY: 'ci-test-secret'
          TESTING: '1'
        run: pytest -q

  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: Ruff full check (non-blocking)
        run: ruff check backend/app || true
      - name: Ruff critical (blocking)
        run: ruff check backend/app --select E9,F63,F7,F82

  frontend-tests:
    name: Frontend vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Run vitest
        run: npm run test

  frontend-lint:
    name: Frontend lint (eslint, non-blocking)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Run eslint
        run: npm run lint || true

  e2e-playwright:
    name: E2E Playwright (PR main only)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d db backend frontend
      - name: Wait for backend
        run: |
          for i in {1..40}; do
            if curl -sSf http://localhost:8000/health > /dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 3
          done
          echo "backend never became ready"; exit 1
      - name: Seed E2E data
        run: docker compose exec -T backend python e2e_seed.py || true
      - name: Run Playwright specs
        run: docker compose --profile test run --rm frontend-e2e-test sh -c "npm install --silent --no-audit --no-fund && npx playwright test auth.spec.js leave-request.spec.js mission-multi-segments.spec.js"
      - name: Collect docker logs
        if: always()
        run: docker compose logs > docker-logs.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts
          path: |
            frontend/test-results/**
            docker-logs.txt
          retention-days: 14

  backend-security:
    name: Backend security audit (pip-audit, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt --strict || true

  frontend-security:
    name: Frontend security audit (npm audit, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run npm audit
        run: npm audit --audit-level=high || true

  trivy-fs:
    name: Trivy filesystem scan (SARIF upload)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

