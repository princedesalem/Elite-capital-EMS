name: 🚀 Deploy – Production (Windows Server)

# Déclenché sur push vers main ET manuellement depuis l'interface GitHub
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Raison du déploiement manuel'
        required: false
        default: 'déploiement manuel'

# Empêche les déploiements parallèles : un seul à la fois, les suivants attendent
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EMS Production Server
    # Le runner self-hosted installé sur C:\actions-runner du serveur de prod
    runs-on: [self-hosted, Windows, X64, production]

    # Timeout global : si le déploiement prend plus de 15 min, on abandonne
    timeout-minutes: 15

    environment:
      name: production
      url: http://192.168.3.227/rh

    defaults:
      run:
        shell: powershell

    steps:
      # ── 0. Permissions + Safe directory ──────────────────────────────────────
      - name: 🔐 Permissions C:\EMS + Git safe.directory
        run: |
          # Donner à SYSTEM (S-1-5-18) le contrôle total sur C:\EMS (language-agnostic)
          icacls 'C:\EMS' /grant '*S-1-5-18:(OI)(CI)F' /T /Q
          git config --global --add safe.directory C:/EMS

      # ── 1. Pull du code ──────────────────────────────────────────────────────
      - name: 📥 Git pull – récupérer la dernière version de main
        run: |
          $repo = 'C:\EMS'
          Write-Host "Répertoire : $repo"

          # S'assurer qu'on est bien sur main et que le remote est correct
          git -C $repo fetch --prune origin
          git -C $repo checkout main
          git -C $repo reset --hard origin/main

          $commit = git -C $repo log -1 --format="%h %s (%an, %ar)"
          Write-Host "Dernier commit : $commit"

      # ── 2. Dépendances backend ───────────────────────────────────────────────
      - name: 🐍 Backend – pip install (virtualenv)
        run: |
          $pip = 'C:\EMS\backend\venv\Scripts\pip.exe'
          $req = 'C:\EMS\backend\requirements.txt'

          if (-not (Test-Path $pip)) {
            throw "pip introuvable dans le venv : $pip"
          }

          Write-Host "Installation des dépendances Python..."
          & $pip install --quiet --no-deps --upgrade -r $req
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Tentative sans --no-deps..."
            & $pip install --quiet -r $req
            if ($LASTEXITCODE -ne 0) { throw "pip install a échoué." }
          }
          Write-Host "Dépendances backend installées."

      # ── 3. Build frontend ────────────────────────────────────────────────────
      - name: 🏗️ Frontend – npm build (Vite)
        run: |
          # Ajouter les emplacements courants de Node.js au PATH (runner NT/Système)
          $nodePaths = @(
            'C:\Program Files\nodejs',
            'C:\Program Files (x86)\nodejs',
            "$env:APPDATA\npm",
            'C:\Users\Stagiaire_OP\scoop\apps\nodejs\current',
            'C:\Users\Stagiaire_OP\AppData\Roaming\npm'
          )
          foreach ($p in $nodePaths) {
            if (Test-Path $p) {
              $env:PATH = "$p;$env:PATH"
              Write-Host "Ajouté au PATH : $p"
            }
          }

          # Vérifier que npm est disponible
          $npmCmd = Get-Command npm -ErrorAction SilentlyContinue
          if (-not $npmCmd) {
            # Recherche exhaustive
            $found = Get-ChildItem 'C:\' -Recurse -Filter 'npm.cmd' -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $env:PATH = "$($found.DirectoryName);$env:PATH"
              Write-Host "npm trouvé : $($found.FullName)"
            } else {
              throw "npm introuvable. Installez Node.js sur le serveur de production."
            }
          }
          Write-Host "npm version : $(npm --version)"

          $frontendDir = 'C:\EMS\frontend'
          Push-Location $frontendDir

          try {
            Write-Host "Installation des dépendances npm..."
            npm install --prefer-offline --no-audit --no-fund
            if ($LASTEXITCODE -ne 0) { throw "npm install a échoué." }

            Write-Host "Build de production..."
            npm run build
            if ($LASTEXITCODE -ne 0) { throw "npm run build a échoué." }

            Write-Host "Build terminé. Contenu de dist/ :"
            Get-ChildItem "$frontendDir\dist" | Select-Object Name, Length | Format-Table -AutoSize
          } finally {
            Pop-Location
          }

      # ── 4. Redémarrage des services ──────────────────────────────────────────
      - name: 🔄 Redémarrer EMS-Backend
        run: |
          Write-Host "Arrêt de EMS-Backend..."
          Stop-Service -Name 'EMS-Backend' -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3

          Write-Host "Démarrage de EMS-Backend..."
          Start-Service -Name 'EMS-Backend'
          Start-Sleep -Seconds 5

          $svc = Get-Service -Name 'EMS-Backend'
          if ($svc.Status -ne 'Running') {
            throw "EMS-Backend n'a pas démarré (statut : $($svc.Status))"
          }
          Write-Host "EMS-Backend est Running."

      - name: 🔄 Redémarrer EMS-Nginx
        run: |
          Write-Host "Arrêt de EMS-Nginx..."
          Stop-Service -Name 'EMS-Nginx' -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2

          Write-Host "Démarrage de EMS-Nginx..."
          Start-Service -Name 'EMS-Nginx'
          Start-Sleep -Seconds 3

          $svc = Get-Service -Name 'EMS-Nginx'
          if ($svc.Status -ne 'Running') {
            throw "EMS-Nginx n'a pas démarré (statut : $($svc.Status))"
          }
          Write-Host "EMS-Nginx est Running."

      # ── 5. Health check ──────────────────────────────────────────────────────
      - name: ✅ Health check
        run: |
          $maxAttempts = 10
          $delay = 6
          $url = 'http://localhost:8000/health'
          Write-Host "Waiting for backend (max $($maxAttempts * $delay)s)..."
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              $r = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10 -ErrorAction Stop
              if ($r.StatusCode -eq 200) {
                Write-Host "Backend OK (attempt $i/$maxAttempts)"
                exit 0
              }
            } catch {
              Write-Host "  Attempt $i/$maxAttempts failed: $_"
            }
            Start-Sleep -Seconds $delay
          }
          throw "Backend did not respond after $($maxAttempts * $delay) seconds."

      # ── 6. Backfill SESSION_UTILISATION ─────────────────────────────────────
      - name: 🗄️ Backfill sessions depuis audit_logs
        run: |
          $python = 'C:\EMS\backend\venv\Scripts\python.exe'
          $script = 'C:\EMS\backend\backfill_sessions_from_audit.py'
          if (-not (Test-Path $script)) {
            Write-Host "Script backfill absent, skip."
            exit 0
          }
          $env:PYTHONPATH = 'C:\EMS\backend'
          Push-Location 'C:\EMS\backend'
          try {
            & $python $script
            if ($LASTEXITCODE -ne 0) { Write-Host "Backfill a retourne $LASTEXITCODE (non bloquant)." }
          } finally { Pop-Location }

      # ── 7. Résumé du déploiement ─────────────────────────────────────────────
      - name: 📋 Résumé
        if: always()
        run: |
          $commit  = git -C 'C:\EMS' log -1 --format="%H"
          $message = git -C 'C:\EMS' log -1 --format="%s"
          $author  = git -C 'C:\EMS' log -1 --format="%an"
          $date    = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          Write-Host "-----------------------------------------"
          Write-Host "  EMS Elite Capital Deploy"
          Write-Host "  Date    : $date"
          Write-Host "  Commit  : $commit"
          Write-Host "  Message : $message"
          Write-Host "  Author  : $author"
          Write-Host "-----------------------------------------"
