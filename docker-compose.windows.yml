# docker-compose.windows.yml — EMS déploiement Windows containers
# Prérequis: Docker Engine Windows sur tcp://localhost:2375
# Usage:
#   $env:DOCKER_HOST = "tcp://localhost:2375"
#   cd C:\EMS
#   # Construire le frontend d'abord (une seule fois ou après modif UI):
#   npm --prefix frontend run build
#   # Lancer les services:
#   docker compose -f docker-compose.windows.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.windows
    image: ems-backend:windows
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    isolation: process
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.windows
    image: ems-frontend:windows
    ports:
      - "5173:5173"
    depends_on:
      - backend
    isolation: process
    restart: unless-stopped
